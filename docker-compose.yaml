services:
    mysql:
        image: mysql:8.0
        container_name: mysql
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: 123456
            MYSQL_DATABASE: books
            MYSQL_USER: user
            MYSQL_PASSWORD: 123456
        ports:
            - '3307:3306'
        volumes:
            - mysql_data:/var/lib/mysql
            - ./mysql/init:/docker-entrypoint-initdb.d

    backend:
        build: ./server
        container_name: backend
        restart: always
        environment:
            DB_HOST: mysql
            DB_USER: user
            DB_PASSWORD: 123456
            DB_NAME: books
        expose:
            - '3000'
        depends_on:
            - mysql
        volumes:
            - ./server:/server
        command: sh -c "npm install && npm run dev"
    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - '80:80'
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./client/dist:/usr/share/nginx/html
        depends_on:
            - backend

volumes:
    mysql_data:
